<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Willkommen</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .box {
      text-align: center;
      background: rgba(255,255,255,0.08);
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 900px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 25px;
    }

    button {
      padding: 14px 28px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    #videoContainer,
    #ende {
      display: none;
    }

    video {
      width: 100%;
      border-radius: 15px;
    }
  </style>
</head>
<body>

<div class="box">

  <div id="startseite">
    <h1>Herzlich Willkommen!</h1>
    <p>Viel Spaß!</p>
    <button onclick="starteVideo()">Los legen</button>
  </div>

  <div id="videoContainer">
    <video id="video" controls autoplay>
      <source src="VERSUCHE%20NICHT%20ZU%20LACHEN%20!!!%20%F0%9F%A4%A3%F0%9F%A4%A3%F0%9F%A4%A3%20%2383.mov" type="video/quicktime">
      Dein Browser unterstützt keine Videos.
    </video>
  </div>

  <div id="ende">
    <h1>Noch?</h1>
    <p>Das Video ist zu Ende.</p>
  </div>

</div>

<script>
function starteVideo() {
  document.getElementById("startseite").style.display = "none";
  document.getElementById("videoContainer").style.display = "block";
}

document.getElementById("video").addEventListener("ended", function() {
  document.getElementById("videoContainer").style.display = "none";
  document.getElementById("ende").style.display = "block";
});
</script>

</body>
</html>
